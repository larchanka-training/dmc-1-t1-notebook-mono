services:
  frontend:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "3000:5173"
    volumes:
      - ./ui:/home/app
      - /home/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
    stdin_open: true
    command: npm run dev -- --host

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OAUTH_NAME_APPLICATION_ID: ${OAUTH_CLIENT_ID}
      OAUTH_NAME_SECRET_KEY: ${OAUTH_CLIENT_SECRET}
      TOKEN_TTL_SECONDS: ${TOKEN_TTL_SECONDS:-86400}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-604800}
    depends_on:
      postgres:
        condition: service_healthy
    stdin_open: true
    command: fastapi dev app/main.py --host 0.0.0.0 --port 8000

  postgres:
    image: postgres:16
    volumes:
      - psql-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}

      PGADMIN_SETUP_SERVER_GROUP: Docker_Servers
      PGADMIN_SETUP_SERVER_NAME: Postgres_DB
      PGADMIN_SETUP_SERVER_HOST: postgres
      PGADMIN_SETUP_SERVER_PORT: 5432
      PGADMIN_SETUP_SERVER_USERNAME: ${POSTGRES_USER}
      PGADMIN_SETUP_SERVER_PASSWORD: ${POSTGRES_PASSWORD}
      PGADMIN_SETUP_SERVER_DB: ${POSTGRES_DB}
      PGADMIN_SETUP_SERVER_SSLMODE: disable
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin-data:/var/lib/pgadmin

  proxy:
    container_name: proxy
    build:
      context: ./proxy
      dockerfile: Dockerfile
    ports:
      - 80:80
      - 443:443
    restart: always

volumes:
  psql-data:
  pgadmin-data:
