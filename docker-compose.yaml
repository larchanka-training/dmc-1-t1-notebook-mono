services:
  frontend:
    build:
      context: ./ui
      dockerfile: Dockerfile
      target: builder
    ports:
      - "3000:5173"
    volumes:
      - ./ui:/home/app
      - ui-node-modules:/home/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      api:
        condition: service_healthy
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
    stdin_open: true
    command: sh -c "npm ci --prefer-offline && npm run dev -- --host"

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    volumes:
      - ./api:/app
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/health')"]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    environment:
      DATABASE_URL: ${DATABASE_URL}
      OAUTH_NAME_APPLICATION_ID: ${OAUTH_CLIENT_ID}
      OAUTH_NAME_SECRET_KEY: ${OAUTH_CLIENT_SECRET}
      SESSION_TTL_SECONDS: ${SESSION_TTL_SECONDS:-604800}
      JWT_SECRET: ${JWT_SECRET:-dev-jwt-secret-replace-in-production}
      JWT_ALGORITHM: ${JWT_ALGORITHM:-HS256}
      ACCESS_TOKEN_TTL_SECONDS: ${ACCESS_TOKEN_TTL_SECONDS:-900}
      COOKIE_DOMAIN: ${COOKIE_DOMAIN:-.notebook.com}
      APP_ENV: ${APP_ENV:-dev}
      OTEL_ENABLED: ${OTEL_ENABLED:-false}
      OTEL_ENDPOINT: ${OTEL_ENDPOINT:-http://aspire-dashboard:18889}
      OTEL_SERVICE_NAME: ${OTEL_SERVICE_NAME:-dmc-1-t1-notebook-api}
      BEDROCK_MODEL_ID: ${BEDROCK_MODEL_ID:-amazon.nova-lite-v1:0}
      BEDROCK_REGION: ${BEDROCK_REGION:-eu-north-1}
      AI_RATE_LIMIT_RPM: ${AI_RATE_LIMIT_RPM:-10}
      AI_RATE_LIMIT_RPD: ${AI_RATE_LIMIT_RPD:-100}
      AI_MAX_PROMPT_CHARS: ${AI_MAX_PROMPT_CHARS:-32000}
    depends_on:
      postgres:
        condition: service_healthy
    stdin_open: true
    command: fastapi dev app/main.py --host 0.0.0.0 --port 8000

  postgres:
    image: postgres:16
    volumes:
      - psql-data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 10

  pgadmin:
    image: dpage/pgadmin4
    container_name: pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_EMAIL}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_PASSWORD}

      PGADMIN_SETUP_SERVER_GROUP: Docker_Servers
      PGADMIN_SETUP_SERVER_NAME: Postgres_DB
      PGADMIN_SETUP_SERVER_HOST: postgres
      PGADMIN_SETUP_SERVER_PORT: 5432
      PGADMIN_SETUP_SERVER_USERNAME: ${POSTGRES_USER}
      PGADMIN_SETUP_SERVER_PASSWORD: ${POSTGRES_PASSWORD}
      PGADMIN_SETUP_SERVER_DB: ${POSTGRES_DB}
      PGADMIN_SETUP_SERVER_SSLMODE: disable
    ports:
      - "5050:80"
    depends_on:
      - postgres
    volumes:
      - pgadmin-data:/var/lib/pgadmin

  aspire-dashboard:
    image: mcr.microsoft.com/dotnet/aspire-dashboard:latest
    ports:
      - "18888:18888"  # UI
      - "4317:18889"   # OTLP gRPC
      - "4318:18890"   # OTLP HTTP
    environment:
      DOTNET_DASHBOARD_UNSECURED_ALLOW_ANONYMOUS: "true"
    restart: unless-stopped

  proxy:
    container_name: proxy
    build:
      context: ./proxy
      dockerfile: Dockerfile
    ports:
      - 80:80
      - 443:443
    restart: always

volumes:
  psql-data:
  pgadmin-data:
  ui-node-modules:
