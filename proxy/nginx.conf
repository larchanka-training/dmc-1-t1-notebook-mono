worker_processes 1;
 
events { worker_connections 1024; }
 
http {

    upstream app {
      server host.docker.internal:3000;
    }

    upstream api {
      server host.docker.internal:8000;
    }

    upstream pgadmin {
      server host.docker.internal:5050;
    }

    upstream aspire {
      server host.docker.internal:18888;
    }
 
    sendfile on;
    include mime.types;

    server {
      listen 80;
      listen 443 ssl;
      server_name pgadmin.notebook.com;

      ssl_certificate /keys/notebook.com.pem;
      ssl_certificate_key /keys/notebook.com-key.pem;

      location / {
          proxy_pass http://pgadmin;
          proxy_redirect     off;
          proxy_set_header   Host $host;
          proxy_set_header   X-Real-IP $remote_addr;
          proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Host $server_name;
      }
    }

    server {
      listen 80;
      listen 443 ssl;
      server_name api.notebook.com;

      ssl_certificate /keys/notebook.com.pem;
      ssl_certificate_key /keys/notebook.com-key.pem;

      location / {
          proxy_pass http://api;
          proxy_redirect     off;
          proxy_set_header   Host $host;
          proxy_set_header   X-Real-IP $remote_addr;
          proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Host $server_name;
      }
    }

    server {
      listen 80;
      listen 443 ssl;
      server_name aspire.notebook.com;

      ssl_certificate /keys/notebook.com.pem;
      ssl_certificate_key /keys/notebook.com-key.pem;

      location / {
          proxy_pass http://aspire;
          proxy_redirect     off;
          proxy_set_header   Host $host;
          proxy_set_header   X-Real-IP $remote_addr;
          proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Host $server_name;
          proxy_http_version 1.1;
          proxy_set_header   Upgrade $http_upgrade;
          proxy_set_header   Connection "upgrade";
      }
    }

    server {
      listen 80;
      listen 443 ssl;
      server_name notebook.com;

      ssl_certificate /keys/notebook.com.pem;
      ssl_certificate_key /keys/notebook.com-key.pem;

      location / {
          proxy_pass http://app;
          proxy_redirect     off;
          proxy_set_header   Host $host;
          proxy_set_header   X-Real-IP $remote_addr;
          proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
          proxy_set_header   X-Forwarded-Host $server_name;
      }
    }
}