name: Set GHCR Secret Prod (one-time, delete after use)

on:
  workflow_dispatch:
    inputs:
      github_username:
        description: "GitHub username"
        required: true
      github_pat:
        description: "GitHub PAT with read:packages"
        required: true

jobs:
  set-secret:
    name: Set GHCR credentials in Secrets Manager (prod)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"
    steps:
      - uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-north-1

      - name: Put GHCR credentials into Secrets Manager (prod)
        run: |
          aws secretsmanager put-secret-value \
            --secret-id dmc-1-t1-notebook-prod-ghcr-credentials \
            --secret-string "{\"username\":\"${{ inputs.github_username }}\",\"password\":\"${{ inputs.github_pat }}\"}"
          echo "Done."
