name: Update Submodules

on:
  repository_dispatch:
    types: [submodule-update]

jobs:
  update-submodules:
    name: Update submodules to latest main
    runs-on: ubuntu-latest
    steps:
      - name: Checkout mono repo with submodules
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.MONO_REPO_PAT }}
          submodules: recursive

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Update submodules to latest
        run: git submodule update --remote --force

      - name: Create PR if submodules changed
        env:
          GH_TOKEN: ${{ secrets.MONO_REPO_PAT }}
        run: |
          if git diff --quiet && git diff --staged --quiet; then
            echo "No changes, skipping PR"
            exit 0
          fi

          # Close old open PRs and delete their branches
          gh pr list --search "chore: update submodules to latest in:title" --state open --json number,headRefName \
            | jq -c '.[]' \
            | while read -r pr; do
                NUMBER=$(echo "$pr" | jq -r '.number')
                BRANCH=$(echo "$pr" | jq -r '.headRefName')
                echo "Closing PR #$NUMBER and deleting branch $BRANCH"
                gh pr close "$NUMBER" --delete-branch
              done

          BRANCH="chore/update-submodules-$(date +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add .
          git commit -m "chore: update submodules to latest"
          git push origin "$BRANCH"
          gh pr create \
            --title "chore: update submodules to latest" \
            --body "Automated submodule update triggered by a merge in API or UI repository." \
            --base main \
            --head "$BRANCH"
